<!DOCTYPE html>
<html>
<head>
<title>Student Productivity Manager</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#24292e;
color:white;
padding:20px;
text-align:center;
}

.container{
margin:40px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
background:#2ea44f;
color:white;
border:none;
cursor:pointer;
}

.task{
background:white;
padding:15px;
margin-top:10px;
border-radius:5px;
}

</style>
</head>

<body>

<header>
<h1>Student Productivity Manager</h1>
</header>

<div class="container">

<input id="taskInput" placeholder="Enter a task">

<button onclick="addTask()">Add Task</button>

<div id="taskList"></div>

</div>

<script>

function addTask(){

let input = document.getElementById("taskInput")

let taskText = input.value

if(taskText === "") return

let task = document.createElement("div")

task.className = "task"

task.innerHTML = taskText

document.getElementById("taskList").appendChild(task)

input.value=""

}

</script>

</body>
</html>
